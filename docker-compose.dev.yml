services:

  # Бэкенд — монтируем исходники, запускаем с --reload
  backend:
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --no-access-log"
    ports:
      - "8000:8000"

  # nginx — локальный конфиг без SSL, фронт встроен в образ через multi-stage build
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    profiles: []   # убираем профиль prod — nginx поднимается и локально
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-local.conf:/etc/nginx/nginx.conf:ro
      # НЕ монтируем /etc/letsencrypt — на локалке его нет
      # НЕ монтируем frontend-v2-dist — фронт собирается внутри Docker
