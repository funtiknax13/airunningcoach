services:

  # Бэкенд — монтируем исходники, запускаем с --reload
  backend:
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --no-access-log"
    ports:
      - "8000:8000"

  # Фронтенд — dev-сервер Vite с HMR
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend-v2:/app
      - frontend_nm:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:8000   # имя сервиса внутри Docker-сети
      - CHOKIDAR_USEPOLLING=true              # нужно на Windows
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

  # nginx в dev не нужен
  nginx:
    profiles:
      - prod

volumes:
  frontend_nm:   # именованный volume для node_modules внутри контейнера
