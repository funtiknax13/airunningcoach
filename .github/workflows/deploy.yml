name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Build frontend
        run: cd frontend-v2 && npm ci && npm run build

      - name: Detect backend changes
        id: changes
        run: |
          git diff HEAD~1 HEAD --name-only | grep -q "^backend/" \
            && echo "backend=true" >> $GITHUB_OUTPUT \
            || echo "backend=false" >> $GITHUB_OUTPUT

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy backend
        run: |
          if [ "${{ steps.changes.outputs.backend }}" = "true" ]; then
            ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "cd ${{ secrets.SERVER_PATH }} && git pull && docker compose up -d --build"
          else
            ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "cd ${{ secrets.SERVER_PATH }} && git pull && docker compose up -d"
          fi

      - name: Upload frontend
        run: |
          tar -C frontend-v2-dist -czf - . | \
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p ${{ secrets.SERVER_PATH }}/frontend-v2-dist && \
             find ${{ secrets.SERVER_PATH }}/frontend-v2-dist -mindepth 1 -delete && \
             tar -C ${{ secrets.SERVER_PATH }}/frontend-v2-dist -xzf -"
