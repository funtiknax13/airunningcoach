name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Build frontend
        run: cd frontend-v2 && npm ci && npm run build

      - name: Detect backend changes
        id: changes
        run: |
          git diff HEAD~1 HEAD --name-only | grep -q "^backend/" \
            && echo "backend=true" >> $GITHUB_OUTPUT \
            || echo "backend=false" >> $GITHUB_OUTPUT

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config <<EOF
          Host ${{ secrets.SERVER_HOST }}
            ServerAliveInterval 30
            ServerAliveCountMax 5
            ConnectTimeout 30
          EOF

      - name: Deploy backend
        run: |
          if [ "${{ steps.changes.outputs.backend }}" = "true" ]; then
            CMD="cd ${{ secrets.SERVER_PATH }} && git pull && docker compose up -d --build"
          else
            CMD="cd ${{ secrets.SERVER_PATH }} && git pull && docker compose up -d"
          fi
          # Сервер иногда роняет исходящий DNS (нестабильная сеть VPS-провайдера),
          # что валит git pull / сборку образа — повторяем так же, как ниже для фронтенда.
          for attempt in 1 2 3; do
            ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "$CMD" \
            && break || { echo "Attempt $attempt failed, retrying..."; sleep 10; }
          done

      - name: Upload frontend
        run: |
          for attempt in 1 2 3; do
            tar -C frontend-v2-dist -czf - . | \
            ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "mkdir -p ${{ secrets.SERVER_PATH }}/frontend-v2-dist && \
               tar -C ${{ secrets.SERVER_PATH }}/frontend-v2-dist -xzf -" \
            && break || { echo "Attempt $attempt failed, retrying..."; sleep 10; }
          done
