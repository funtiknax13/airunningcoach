name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Build frontend
        run: cd frontend-v2 && npm ci && npm run build

      - name: Detect backend changes
        id: changes
        run: |
          git diff HEAD~1 HEAD --name-only | grep -q "^backend/" \
            && echo "backend=true" >> $GITHUB_OUTPUT \
            || echo "backend=false" >> $GITHUB_OUTPUT

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Сеть VPS нестабильна (см. историю деплоев) — ssh-keyscan тоже может не
          # достучаться с первого раза. Раньше ошибка глушилась `|| true`, и деплой
          # ниже падал с "Host key verification failed" из-за пустого known_hosts.
          #
          # ВАЖНО: GitHub Actions выполняет `run:` под `bash -e`. Присваивание вида
          # `keys=$(cmd)` как отдельный statement — это НЕ условие if/while, поэтому
          # `-e` считает его обычной командой и завершает скрипт при первом же падении
          # ssh-keyscan, даже не дав циклу дойти до retry (проверено локально: без
          # `if ... && ...` цикл падает молча на 1-й попытке). Держим команду именно
          # внутри условия if, чтобы -e её не убивал.
          success=false
          for attempt in 1 2 3; do
            if keys=$(ssh-keyscan -H "${{ secrets.SERVER_HOST }}" 2>/dev/null) && [ -n "$keys" ]; then
              echo "$keys" >> ~/.ssh/known_hosts
              success=true
              break
            fi
            echo "ssh-keyscan attempt $attempt failed, retrying..."
            sleep 5
          done
          if [ "$success" != "true" ]; then
            echo "::error::ssh-keyscan failed after 3 attempts"
            exit 1
          fi

          cat >> ~/.ssh/config <<EOF
          Host ${{ secrets.SERVER_HOST }}
            ServerAliveInterval 30
            ServerAliveCountMax 5
            ConnectTimeout 30
          EOF

      - name: Deploy backend
        run: |
          # Явно перечисляем postgres+backend — nginx теперь нативный (см.
          # nginx/nginx-native.conf), а сервис nginx в docker-compose.yml оставлен
          # только как аварийный откат (остановлен). Бинарный "up -d" без списка
          # сервисов поднял бы и его тоже, отобрав порты 80/443 у нативного nginx.
          if [ "${{ steps.changes.outputs.backend }}" = "true" ]; then
            CMD="cd ${{ secrets.SERVER_PATH }} && git pull && docker compose up -d --build postgres backend"
          else
            CMD="cd ${{ secrets.SERVER_PATH }} && git pull && docker compose up -d postgres backend"
          fi
          # Сервер иногда роняет исходящий DNS (нестабильная сеть VPS-провайдера),
          # что валит git pull / сборку образа — повторяем так же, как ниже для фронтенда.
          # ВАЖНО: цикл должен явно упасть (exit 1), если все попытки провалились —
          # раньше последняя ветка `|| { echo ...; sleep 10; }` сама завершалась успешно,
          # и шаг репортился как success, даже если деплой ни разу не прошёл.
          success=false
          for attempt in 1 2 3; do
            if ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "$CMD"; then
              success=true
              break
            fi
            echo "Attempt $attempt failed, retrying..."
            sleep 10
          done
          if [ "$success" != "true" ]; then
            echo "::error::Deploy backend failed after 3 attempts"
            exit 1
          fi

      - name: Deploy nginx config
        run: |
          # Нативный nginx (не в Docker) — конфиг лежит в репо и синкается сюда
          # при каждом деплое, чтобы /etc/nginx/nginx.conf не расходился с git.
          # command -v nginx делает шаг no-op, пока миграция на нативный nginx
          # ещё не выполнена вручную на сервере.
          success=false
          for attempt in 1 2 3; do
            if cat nginx/nginx-native.conf | \
               ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
                 "if command -v nginx >/dev/null 2>&1; then \
                    cat > /tmp/nginx.conf.new && \
                    cp /tmp/nginx.conf.new /etc/nginx/nginx.conf && \
                    nginx -t && systemctl reload nginx; \
                  else \
                    cat > /dev/null; echo 'native nginx not installed yet, skipping'; \
                  fi"; then
              success=true
              break
            fi
            echo "Attempt $attempt failed, retrying..."
            sleep 10
          done
          if [ "$success" != "true" ]; then
            echo "::error::Deploy nginx config failed after 3 attempts"
            exit 1
          fi

      - name: Upload frontend
        run: |
          success=false
          for attempt in 1 2 3; do
            if tar -C frontend-v2-dist -czf - . | \
               ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
                 "mkdir -p ${{ secrets.SERVER_PATH }}/frontend-v2-dist && \
                  tar -C ${{ secrets.SERVER_PATH }}/frontend-v2-dist -xzf -"; then
              success=true
              break
            fi
            echo "Attempt $attempt failed, retrying..."
            sleep 10
          done
          if [ "$success" != "true" ]; then
            echo "::error::Upload frontend failed after 3 attempts"
            exit 1
          fi
