services:

  postgres:
    image: postgres:16-alpine
    restart: always
    mem_limit: 384m
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-runcoach}
      POSTGRES_USER:     ${POSTGRES_USER:-runcoach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Тюнинг под mem_limit контейнера (384m) — сервер сам по себе 2 ГБ ОЗУ
    command: >
      postgres
        -c shared_buffers=64MB
        -c effective_cache_size=128MB
        -c work_mem=4MB
        -c maintenance_work_mem=32MB
        -c max_connections=50
        -c wal_buffers=8MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c log_min_duration_statement=1000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-runcoach} -d ${POSTGRES_DB:-runcoach}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    mem_limit: 768m
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    # 127.0.0.1-only — даёт нативному nginx (см. nginx/nginx-native.conf)
    # достучаться до бэкенда без публикации порта наружу.
    ports:
      - "127.0.0.1:8000:8000"

  nginx:
    image: nginx:alpine
    restart: always
    mem_limit: 160m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend-v2-dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  postgres_data:
