worker_processes auto;
worker_rlimit_nofile 1024;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50m;
    charset utf-8;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Логи только ошибок — экономим диск
    access_log off;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name airunningcoach.pro www.airunningcoach.pro;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name airunningcoach.pro www.airunningcoach.pro;

        ssl_certificate     /etc/letsencrypt/live/airunningcoach.pro/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/airunningcoach.pro/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        root /usr/share/nginx/html;

        # SQLAdmin — проксируем весь /admin на бэкенд (^~ приоритетнее regex и SPA-fallback)
        location ^~ /admin {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # JSON-LD схема для лендинга — имя файла НЕ хэшируется (в отличие от
        # /assets/*.js от Vite), поэтому её нельзя кешировать вечно как остальной
        # JS: контент может измениться между деплоями под тем же именем.
        # location = имеет приоритет над regex-блоком ниже независимо от порядка.
        location = /schema.js {
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        # Кеширование статики фронтенда
        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Google OAuth callback — проксируем на бэкенд (/api/auth/google/callback)
        location = /auth/google/callback {
            proxy_pass         http://backend:8000/api/auth/google/callback$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # SPA-маршруты OAuth-колбэка — отдаём index.html
        location = /auth/callback {
            add_header Cache-Control "no-cache";
            try_files $uri /index.html;
        }

        # Системные эндпоинты бэкенда (без /api префикса)
        location ~ ^/(health$|docs$|openapi\.json$) {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # API — все запросы под /api/ проксируем на бэкенд
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Таймауты для AI-запросов (могут быть долгими)
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Статический лендинг для главной страницы (SEO-индексируемый HTML)
        location = / {
            add_header Cache-Control "no-cache";
            try_files /landing.html =404;
        }

        # Английская версия лендинга
        location = /en/ {
            add_header Cache-Control "no-cache";
            try_files /en/index.html =404;
        }
        location = /en {
            return 301 /en/;
        }

        # SPA fallback — все остальные пути отдают index.html.
        # index.html не кешируем: без этого браузер после деплоя может показывать
        # старую версию (старые тексты, старый JS) ещё долго — try_files всегда
        # отдаёт актуальный index.html, но кешированный browser отдаёт старый без
        # обращения к серверу вовсе. Хешированные js/css (см. блок выше) кешируются
        # безопасно — при изменении контента меняется и имя файла.
        location / {
            add_header Cache-Control "no-cache";
            try_files $uri $uri/ /index.html;
        }
    }
}

