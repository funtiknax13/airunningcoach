worker_processes 1;
worker_rlimit_nofile 1024;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Логи только ошибок — экономим диск
    access_log off;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;

        # Статика sqladmin — ^~ отменяет regex и проксирует на бэкенд
        location ^~ /admin/statics/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Кеширование статики фронтенда
        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # SPA-маршруты OAuth-колбэка — отдаём index.html
        location = /auth/callback {
            try_files $uri /index.html;
        }

        # API — проксируем на FastAPI бэкенд
        location ~ ^/(auth|activities|goals|training|chat|ai-insights|admin|health|docs|openapi\.json) {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Таймауты для AI-запросов (могут быть долгими)
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # SPA fallback — все остальные пути отдают index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
