worker_processes 1;
worker_rlimit_nofile 1024;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Логи только ошибок — экономим диск
    access_log off;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name airunningcoach.pro www.airunningcoach.pro;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name airunningcoach.pro www.airunningcoach.pro;

        ssl_certificate     /etc/letsencrypt/live/airunningcoach.pro/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/airunningcoach.pro/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        root /usr/share/nginx/html;

        # Статика sqladmin — ^~ отменяет regex и проксирует на бэкенд
        location ^~ /admin/statics/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Кеширование статики фронтенда
        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Google OAuth callback — проксируем на бэкенд (/api/auth/google/callback)
        location = /auth/google/callback {
            proxy_pass         http://backend:8000/api/auth/google/callback$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # SPA-маршруты OAuth-колбэка — отдаём index.html
        location = /auth/callback {
            try_files $uri /index.html;
        }

        # Системные эндпоинты бэкенда (без /api префикса)
        location ~ ^/(health$|docs$|openapi\.json$) {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # API — все запросы под /api/ проксируем на бэкенд
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Таймауты для AI-запросов (могут быть долгими)
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # SPA fallback — все остальные пути отдают index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}

