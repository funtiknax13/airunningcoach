<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Orange background -->
  <rect width="32" height="32" rx="7" fill="#F85C1E"/>

  <!-- Partial circle ring -->
  <path d="M 5 26 A 13 13 0 1 1 27 26"
        stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Speed lines -->
  <line x1="1"  y1="12" x2="8"  y2="12" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="2"  y1="15" x2="9"  y2="15" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="1"  y1="18" x2="7"  y2="18" stroke="white" stroke-width="1"   stroke-linecap="round"/>
  <line x1="2"  y1="21" x2="6"  y2="21" stroke="white" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="7"  y1="21" x2="9"  y2="21" stroke="white" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Sparkle -->
  <path d="M 22 5 L 23 3 L 24 5 L 26 6 L 24 7 L 23 9 L 22 7 L 20 6 Z" fill="white"/>

  <!-- Runner -->
  <circle cx="21" cy="7.5" r="2.2" fill="white"/>
  <!-- Torso -->
  <line x1="20.5" y1="9.5" x2="17"  y2="17"  stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Right arm forward -->
  <line x1="19.5" y1="11.5" x2="23" y2="9.5" stroke="white" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="23"   y1="9.5"  x2="25" y2="6.5" stroke="white" stroke-width="1.7" stroke-linecap="round"/>
  <!-- Left arm back -->
  <line x1="18.5" y1="12.5" x2="15" y2="15"  stroke="white" stroke-width="1.9" stroke-linecap="round"/>
  <!-- Right leg forward -->
  <line x1="17.5" y1="16.5" x2="20.5" y2="22" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="20.5" y1="22"   x2="24"   y2="24" stroke="white" stroke-width="2"   stroke-linecap="round"/>
  <!-- Left leg push-off -->
  <line x1="16.5" y1="17"   x2="13.5" y2="22" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="13.5" y1="22"   x2="12"   y2="26" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>
